services:
  db:
    image: mysql:8.0
    container_name: hrms_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: hrms
      MYSQL_USER: hrms
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Dushanbe
    volumes:
      - hrms_mysql:/var/lib/mysql
    ports:
      - "7171:3306"
    networks:
      - hrms_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hrms_backend
    env_file: .env
    environment:
      PORT: 7070
      ISUP_PORT: 7660
      ISUP_ENC_KEY: ${ISUP_ENC_KEY:-}
      TZ: Asia/Dushanbe
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./skud.sql:/app/skud.sql:ro
    networks:
      - hrms_net
      - proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').request({ host: 'localhost', port: 7070, path: '/' }, res => process.exit(res.statusCode === 200 ? 0 : 1)).end()"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "7272:7070"
      - "7660:7660"   # ISUP5.0 — Hikvision устройства подключаются сюда напрямую

  frontend:
    build: ./frontend
    container_name: hrms_frontend
    env_file: .env
    environment:
      TZ: Asia/Dushanbe
    depends_on:
      - backend
    networks:
      - hrms_net
      - proxy
    restart: unless-stopped
    ports:
      - "7373:7070"


volumes:
  hrms_mysql:

networks:
  hrms_net:
    name: hrms_net
    driver: bridge
  proxy:
    external: true
